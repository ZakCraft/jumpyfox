<style>

*{margin:0;padding:0;box-sizing:border-box;}
:root{--orange:#FF6B1A;--gold:#FFD700;--dark:#1a0a00;}
body{background:radial-gradient(ellipse at top,#2d1a00,#0a0500);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Fredoka One',cursive;overflow:hidden;touch-action:none;}
#gameWrapper{position:relative;width:min(800px,100vw);max-width:800px;}
#hud{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;background:rgba(0,0,0,0.72);border-radius:16px 16px 0 0;color:var(--gold);font-size:clamp(11px,2vw,17px);gap:5px;flex-wrap:wrap;}
#hud span{display:flex;align-items:center;gap:3px;}
#lives{color:#ff6b6b;}
#envBadge{background:rgba(255,255,255,0.12);border:1px solid rgba(255,215,0,0.35);border-radius:50px;padding:2px 9px;font-size:clamp(10px,1.6vw,13px);color:#ffe;}
canvas{display:block;width:100%;border-radius:0 0 16px 16px;cursor:none;}
.hudBtn{background:rgba(255,255,255,0.12);border:2px solid rgba(255,215,0,0.4);border-radius:50px;color:var(--gold);font-size:clamp(11px,1.7vw,15px);padding:3px 9px;cursor:pointer;font-family:'Fredoka One',cursive;transition:background 0.2s;}
.hudBtn:hover{background:rgba(255,255,255,0.22);}
/* milestone bar */
#milestoneBar{position:absolute;top:36px;left:0;right:0;height:5px;background:rgba(0,0,0,0.25);}
#milestoneProgress{height:100%;background:linear-gradient(90deg,var(--orange),var(--gold));width:0%;transition:width 0.35s;}
/* overlay — two-column layout */
#overlay{position:absolute;top:41px;left:0;right:0;bottom:0;display:flex;flex-direction:row;align-items:stretch;background:rgba(0,0,0,0.88);border-radius:0 0 16px 16px;color:white;overflow:hidden;}
/* LEFT PANEL */
#overlayLeft{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 14px 14px;gap:9px;flex:0 0 54%;text-align:center;border-right:1px solid rgba(255,215,0,0.15);}
#overlay h1{font-size:clamp(20px,4.5vw,42px);color:var(--gold);text-shadow:3px 3px 0 var(--orange),5px 5px 0 rgba(0,0,0,0.3);letter-spacing:2px;margin:0;}
#overlayMsg{font-family:'Nunito',sans-serif;font-size:clamp(10px,1.7vw,13px);color:#ffe;line-height:1.4;margin:0;}
.btn{background:linear-gradient(135deg,var(--orange),#FF8C00);border:3px solid var(--gold);color:white;font-family:'Fredoka One',cursive;font-size:clamp(13px,2.5vw,20px);padding:9px 26px;border-radius:50px;cursor:pointer;box-shadow:0 5px 16px rgba(255,107,26,0.5);transition:transform 0.1s;-webkit-tap-highlight-color:transparent;}
.btn:active{transform:scale(0.96);}
.btn.sec{background:linear-gradient(135deg,#444,#666);border-color:#aaa;}
#levelBadge{background:var(--orange);border:3px solid var(--gold);border-radius:50px;padding:4px 14px;font-size:clamp(13px,2.2vw,19px);color:white;}
/* name form */
#nameForm{display:flex;gap:7px;align-items:center;flex-wrap:wrap;justify-content:center;}
#nameInput{font-family:'Fredoka One',cursive;font-size:clamp(12px,2vw,16px);padding:7px 14px;border-radius:50px;border:3px solid var(--gold);background:rgba(255,255,255,0.1);color:white;outline:none;width:150px;}
#nameInput::placeholder{color:rgba(255,255,255,0.38);}
/* RIGHT PANEL — leaderboard */
#overlayRight{display:flex;flex-direction:column;flex:0 0 46%;overflow:hidden;}
#sbTitle{font-family:'Fredoka One',cursive;font-size:clamp(11px,1.8vw,15px);color:var(--gold);padding:7px 10px 4px;text-align:center;letter-spacing:0.5px;border-bottom:1px solid rgba(255,215,0,0.2);background:rgba(255,215,0,0.07);flex-shrink:0;}
/* scoreboard fills the right panel */
#scoreboard{display:flex;flex-direction:column;flex:1;overflow:hidden;font-family:'Nunito',sans-serif;}
#scoreboard .sb-head{display:grid;grid-template-columns:26px 1fr auto 58px;padding:5px 8px;background:rgba(255,215,0,0.13);font-weight:800;font-size:clamp(8px,1.4vw,11px);color:var(--gold);gap:3px;flex-shrink:0;}
#sbRows{flex:1;overflow-y:auto;}
#sbRows::-webkit-scrollbar{width:3px;}
#sbRows::-webkit-scrollbar-thumb{background:rgba(255,215,0,0.3);border-radius:2px;}

.sb-row .rank{color:var(--gold);font-weight:800;font-size:clamp(9px,1.5vw,13px);}

.sb-row .wld{color:#90caf9;font-size:clamp(7px,1.2vw,10px);white-space:nowrap;text-align:right;opacity:0.9;}

#sbLoading{color:#666;font-size:11px;padding:12px 8px;font-family:'Nunito',sans-serif;text-align:center;}
/* pause */
#pauseOverlay{position:absolute;top:41px;left:0;right:0;bottom:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.72);border-radius:0 0 16px 16px;gap:14px;}

#transText{font-size:clamp(12px,2.2vw,18px);color:white;text-shadow:1px 1px 6px rgba(0,0,0,0.95);background:rgba(0,0,0,0.45);border:1px solid rgba(255,215,0,0.4);border-radius:10px;padding:6px 12px;text-align:right;line-height:1.4;}
/* mobile */
#mobileControls{display:none;width:min(800px,100vw);padding:7px 10px;gap:8px;justify-content:space-between;align-items:center;}
.mBtn{background:linear-gradient(135deg,rgba(255,107,26,0.9),rgba(255,140,0,0.9));border:2px solid var(--gold);border-radius:14px;color:white;font-size:24px;width:66px;height:56px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;user-select:none;box-shadow:0 4px 10px rgba(0,0,0,0.4);transition:transform 0.1s;}

#jumpMBtn{width:84px;height:64px;font-size:28px;border-radius:18px;background:linear-gradient(135deg,rgba(70,180,70,0.9),rgba(30,130,30,0.9));}

/* popups */
#scorePopups{position:absolute;top:41px;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden;}
.popup{position:absolute;font-family:'Fredoka One',cursive;font-size:19px;text-shadow:1px 1px 0 rgba(0,0,0,0.5);animation:popUp 0.9s ease-out forwards;pointer-events:none;}

async function loadLeaderboard(){
  try{
    // Fetch more rows so we can deduplicate by name client-side and still get top 5 unique players
    const r=await fetch(SUPABASE_URL+'/rest/v1/scores?select=player_name,score,world&order=score.desc&limit=100',{
      method:'GET',
      headers:{
        'apikey':SUPABASE_KEY,
        'Authorization':'Bearer '+SUPABASE_KEY,
        'Content-Type':'application/json'
      }
    });
    if(!r.ok){const t=await r.text();console.warn('Leaderboard failed:',r.status,t);return[];}
    const all=await r.json();
    // Deduplicate: keep only the highest score per player name
    const seen=new Map();
    for(const row of all){
      const key=row.player_name.trim().toLowerCase();
      if(!seen.has(key)) seen.set(key,row);
    }
    // Return top 5 unique players by score
    return Array.from(seen.values()).slice(0,10);
  }catch(e){console.warn('Leaderboard error:',e);return[];}
}
async function saveScore(name,sc,world){
  try{
    const r=await fetch(SUPABASE_URL+'/rest/v1/scores',{
      method:'POST',
      headers:{
        'apikey':SUPABASE_KEY,
        'Authorization':'Bearer '+SUPABASE_KEY,
        'Content-Type':'application/json',
        'Prefer':'return=minimal'
      },
      body:JSON.stringify({player_name:name,score:sc,world:world})
    });
    if(!r.ok){const t=await r.text();console.warn('Save failed:',r.status,t);}
    else{console.log('Score saved OK:',name,sc);}
  }catch(e){console.warn('Save error:',e);}
}

const AC=window.AudioContext||window.webkitAudioContext;
let ac=null,muted=false,bgGain,masterGain,bgNodes=[];
function initAudio(){
  if(ac)return;
  ac=new AC();
  masterGain=ac.createGain();masterGain.gain.value=1;masterGain.connect(ac.destination);
  bgGain=ac.createGain();bgGain.gain.value=0.15;bgGain.connect(masterGain);
}
function playTone(freq,type,dur,vol=0.3,delay=0){
  if(!ac||muted)return;
  const o=ac.createOscillator(),g=ac.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(0,ac.currentTime+delay);
  g.gain.linearRampToValueAtTime(vol,ac.currentTime+delay+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+delay+dur);
  o.connect(g);g.connect(masterGain);
  o.start(ac.currentTime+delay);o.stop(ac.currentTime+delay+dur);
}
function playJump(){playTone(300,'sine',0.08,0.25);playTone(500,'sine',0.12,0.2,0.06);playTone(700,'sine',0.1,0.15,0.12);}
function playLand(){playTone(120,'square',0.07,0.3);playTone(80,'sawtooth',0.1,0.2,0.03);}
function playCollect(){[523,659,784,1047].forEach((f,i)=>playTone(f,'sine',0.1,0.2,i*0.07));}
function playHurt(){playTone(200,'sawtooth',0.05,0.4);playTone(150,'sawtooth',0.08,0.4,0.06);playTone(100,'sawtooth',0.12,0.3,0.13);}
function playGameOver(){[392,330,261,196].forEach((f,i)=>playTone(f,'sawtooth',0.2,0.3,i*0.18));}

function startBgMusic(){
  stopBgMusic();
  const notes=ENV_MUSIC[currentEnv]||ENV_MUSIC.forest;
  let i=0;
  function sched(){
    if(muted||!gameRunning||gamePaused)return;
    const o=ac.createOscillator(),g=ac.createGain();
    o.type='triangle';o.frequency.value=notes[i%notes.length];
    g.gain.setValueAtTime(0,ac.currentTime);
    g.gain.linearRampToValueAtTime(0.15,ac.currentTime+0.05);
    g.gain.linearRampToValueAtTime(0.04,ac.currentTime+0.22);
    g.gain.linearRampToValueAtTime(0,ac.currentTime+0.3);
    o.connect(g);g.connect(bgGain);
    o.start();o.stop(ac.currentTime+0.32);
    i++;bgNodes.push(setTimeout(sched,310));
  }
  sched();
}
function stopBgMusic(){bgNodes.forEach(clearTimeout);bgNodes=[];}
function toggleMute(){
  muted=!muted;
  document.getElementById('muteBtn').textContent=muted?'🔇':'🔊';
  if(!muted&&gameRunning&&!gamePaused)startBgMusic(); else stopBgMusic();
}

let playerName=localStorage.getItem('jumpyFoxName')||'';
let frameId,lastTime=0;
let dist=0,gameSpeed=3,obsTimer=0,obsInterval=120,coinTimer=0;
let obstacles=[],coins=[],particles=[];
let levelBannerTimer=0,levelBannerText='',mileBannerTimer=0,mileBannerText='';

const fox={x:120,y:GROUND,vy:0,vx:0,w:60,h:50,onGround:true,jumping:false,
  frame:0,blinking:false,invincible:false,invTimer:0,djUsed:false};
const keys={left:false,right:false,space:false,spacePrev:false};

// ════════════════════════════════
// INIT WORLD
// ════════════════════════════════
function initWorld(){
  clouds=[];
  for(let i=0;i<6;i++) clouds.push({x:Math.random()*W,y:18+Math.random()*75,w:80+Math.random()*80,speed:0.3+Math.random()*0.4});
  stars=[];
  for(let i=0;i<55;i++) stars.push({x:Math.random()*W,y:Math.random()*(GROUND-20),r:0.5+Math.random()*1.5,b:0.5+Math.random()*0.5});
  rebuildBg();
}
function rebuildBg(){
  bgElements=[];
  const id=WORLDS[currentEnvIdx].id;
  if(id==='forest'){
    for(let i=0;i<10;i++) bgElements.push({x:i*(W/9),h:60+Math.random()*50});
  } else if(id==='mountain'){
    for(let i=0;i<5;i++) bgElements.push({x:i*(W/3.5)-30,w:200+Math.random()*80,h:100+Math.random()*80,col:['#607D8B','#546E7A','#78909C'][i%3]});
  } else if(id==='sahara'){
    // Dunes + camels
    for(let i=0;i<6;i++) bgElements.push({t:'dune',x:i*(W/5)-20,w:180+Math.random()*80,h:40+Math.random()*30});
    bgElements.push({t:'camel',x:120,h:50},{t:'camel',x:520,h:45});
  } else if(id==='pyramid'){
    for(let i=0;i<4;i++) bgElements.push({x:i*(W/3)-20,w:140+Math.random()*60,h:80+Math.random()*50});
  } else if(id==='casablanca'){
    // Mosque domes + minarets on skyline
    bgElements.push({t:'mosque',x:60},{t:'mosque',x:340},{t:'mosque',x:590});
    for(let i=0;i<4;i++) bgElements.push({t:'arch_bg',x:i*210+30,w:80,h:55});
  } else if(id==='marrakech'){
    // Riads + lanterns + palm trees
    for(let i=0;i<4;i++) bgElements.push({t:'riad',x:i*220-10,w:120,h:80});
    for(let i=0;i<5;i++) bgElements.push({t:'palm',x:i*160+60,h:70+Math.random()*30});
  } else if(id==='greatwall'){
    // Wall towers along horizon
    for(let i=0;i<5;i++) bgElements.push({t:'tower',x:i*185-20,w:60,h:80+Math.random()*30});
    // Mountains behind
    for(let i=0;i<4;i++) bgElements.push({t:'mtbg',x:i*230-40,w:260,h:90+Math.random()*50,col:'#78909C'});
  } else if(id==='japan'){
    // Mount Fuji + cherry trees + pagoda
    bgElements.push({t:'fuji',x:W/2-80});
    for(let i=0;i<6;i++) bgElements.push({t:'cherry',x:i*140+20,h:60+Math.random()*25});
    bgElements.push({t:'pagoda',x:30},{t:'pagoda',x:560});
  } else if(id==='paris'){
    // Eiffel Tower + Haussmann buildings
    bgElements.push({t:'eiffel',x:W/2-20});
    for(let i=0;i<5;i++) bgElements.push({t:'haussmann',x:i*175-10,w:100,h:70+Math.random()*30});
  } else if(id==='barcelona'){
    // Sagrada Familia spires + palms
    bgElements.push({t:'sagrada',x:W/2-40});
    for(let i=0;i<5;i++) bgElements.push({t:'palm',x:i*160+30,h:65+Math.random()*20});
  } else if(id==='london'){
    // Tower Bridge + Big Ben + red buses on horizon
    bgElements.push({t:'tower_bridge',x:W/2-70});
    bgElements.push({t:'bigben',x:80});
    for(let i=0;i<4;i++) bgElements.push({t:'london_bldg',x:i*200+10,w:90,h:60+Math.random()*30});
  } else if(id==='newyork'){
    // Skyline: skyscrapers + Statue of Liberty
    const hts=[120,100,130,90,110,140,85,115,95];
    for(let i=0;i<9;i++) bgElements.push({t:'skyscraper',x:i*92-10,w:70+Math.random()*20,h:hts[i]});
    bgElements.push({t:'liberty',x:W-90});
  } else if(id==='cincinnati'){
    // Roebling Bridge arches + Ohio river hills
    bgElements.push({t:'roebling',x:W/2-100});
    for(let i=0;i<4;i++) bgElements.push({t:'ohio_hill',x:i*230-20,w:280,h:50+Math.random()*30,col:['#5D4037','#6D4C41','#4E342E'][i%3]});
  } else if(id==='niagara'){
    // Waterfall mist + cliffs
    bgElements.push({t:'falls',x:W*0.3});
    for(let i=0;i<4;i++) bgElements.push({t:'cliff',x:i*210,w:160,h:60+Math.random()*30});
  } else if(id==='hawaii'){
    // Volcano + palm trees + ocean shimmer
    bgElements.push({t:'hawaii_vol',x:W/2-60,w:200,h:110});
    for(let i=0;i<6;i++) bgElements.push({t:'palm',x:i*140+10,h:70+Math.random()*30});
  } else if(id==='australia'){
    // Uluru + gum trees + kangaroos silhouettes
    bgElements.push({t:'uluru',x:W/2-70,w:200,h:80});
    for(let i=0;i<5;i++) bgElements.push({t:'gum',x:i*155+20,h:65+Math.random()*35});
    bgElements.push({t:'roo',x:100},{t:'roo',x:500});
  } else if(id==='arctic'){
    for(let i=0;i<6;i++){
      const bx=i*(W/5),by=GROUND-30-Math.random()*50,bh=40+Math.random()*40,bw=60+Math.random()*40;
      bgElements.push({pts:[{x:bx,y:GROUND},{x:bx+bw*0.1,y:by+bh*0.3},{x:bx+bw*0.3,y:by},{x:bx+bw*0.6,y:by-bh*0.15},{x:bx+bw*0.85,y:by+bh*0.1},{x:bx+bw,y:GROUND}],col:`rgba(${144+Math.random()*40|0},${202+Math.random()*30|0},249,0.7)`});
    }
  } else if(id==='volcano'){
    for(let i=0;i<3;i++) bgElements.push({x:i*(W/2.2)-20,w:160+Math.random()*60,h:90+Math.random()*60,col:['#424242','#37474F','#263238'][i%3]});
  } else if(id==='space'){
    bgElements.push({x:80,y:50,r:30,c1:'#7C4DFF',c2:'#B388FF',ring:true},{x:600,y:70,r:20,c1:'#F06292',c2:'#F48FB1',ring:false},{x:360,y:35,r:14,c1:'#26A69A',c2:'#80CBC4',ring:false});
  }
}

function scrollBg(dtF){
  const id=WORLDS[currentEnvIdx].id;
  // Most bg elements scroll slowly for parallax
  if(id==='arctic'){
    bgElements.forEach(ic=>{if(ic.pts){ic.pts.forEach(pt=>{pt.x-=0.4*dtF;});if(ic.pts[0].x+120<0)ic.pts.forEach(pt=>{pt.x+=W+120;});}});
  } else if(id==='space'){
    // planets don't scroll
  } else {
    bgElements.forEach(el=>{
      if(el.x!==undefined){el.x-=0.3*dtF;const ew=el.w||150;if(el.x+ew<-60)el.x=W+60;}
      if(el.pts){el.pts.forEach(pt=>{pt.x-=0.3*dtF;});if(el.pts[0].x+120<0)el.pts.forEach(pt=>{pt.x+=W+120;});}
    });
  }
}

// ════════════════════════════════
// DRAW SKY + GROUND
// ════════════════════════════════
function drawSky(){
  const w=WORLDS[currentEnvIdx];
  const g=ctx.createLinearGradient(0,0,0,GROUND);
  g.addColorStop(0,w.sky[0]);g.addColorStop(0.5,w.sky[1]);g.addColorStop(1,w.sky[2]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,GROUND);
}
function drawGround(){
  const w=WORLDS[currentEnvIdx];
  const id=w.id;
  const gg=ctx.createLinearGradient(0,GROUND,0,H);
  gg.addColorStop(0,w.gb);gg.addColorStop(1,'#111');
  ctx.fillStyle=gg;ctx.fillRect(0,GROUND,W,H-GROUND);
  const gr=ctx.createLinearGradient(0,GROUND-6,0,GROUND+10);
  gr.addColorStop(0,w.gl);gr.addColorStop(1,w.gt);
  ctx.fillStyle=gr;ctx.fillRect(0,GROUND-6,W,14);
  // Ground detail per world
  if(id==='forest'){
    ctx.fillStyle='#4CAF50';
    for(let i=0;i<20;i++){const gx=((i*47-dist*0.5)%W+W)%W;ctx.beginPath();ctx.moveTo(gx,GROUND);ctx.lineTo(gx-4,GROUND-10);ctx.lineTo(gx+2,GROUND-8);ctx.lineTo(gx+5,GROUND-12);ctx.lineTo(gx+8,GROUND-7);ctx.lineTo(gx+11,GROUND);ctx.fill();}
  }
  if(id==='arctic'){ctx.strokeStyle='rgba(144,202,249,0.35)';ctx.lineWidth=1;for(let i=0;i<8;i++){const lx=((i*95-dist*0.3)%W+W)%W;ctx.beginPath();ctx.moveTo(lx,GROUND);ctx.lineTo(lx+18,GROUND+8);ctx.lineTo(lx+28,GROUND+2);ctx.stroke();}}
  if(id==='volcano'){ctx.strokeStyle='rgba(255,87,34,0.6)';ctx.lineWidth=2;for(let i=0;i<6;i++){const lx=((i*127-dist*0.4)%W+W)%W;ctx.beginPath();ctx.moveTo(lx,GROUND);ctx.lineTo(lx+18,GROUND+9);ctx.stroke();}}
  if(id==='sahara'||id==='australia'){
    // sand ripples
    ctx.strokeStyle='rgba(139,90,20,0.3)';ctx.lineWidth=1;
    for(let i=0;i<10;i++){const lx=((i*78-dist*0.6)%W+W)%W;ctx.beginPath();ctx.moveTo(lx,GROUND+4);ctx.quadraticCurveTo(lx+20,GROUND+1,lx+40,GROUND+4);ctx.stroke();}
  }
  if(id==='newyork'||id==='cincinnati'||id==='london'){
    // pavement cracks
    ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=1;
    for(let i=0;i<8;i++){const lx=((i*100-dist*0.5)%W+W)%W;ctx.beginPath();ctx.moveTo(lx,GROUND+2);ctx.lineTo(lx+80,GROUND+2);ctx.stroke();ctx.beginPath();ctx.moveTo(lx+40,GROUND+2);ctx.lineTo(lx+40,GROUND+12);ctx.stroke();}
  }
  if(id==='niagara'){
    // rippling water
    ctx.strokeStyle='rgba(100,220,255,0.5)';ctx.lineWidth=1.5;
    for(let i=0;i<12;i++){const lx=((i*65-dist*0.8)%W+W)%W;ctx.beginPath();ctx.moveTo(lx,GROUND+5);ctx.quadraticCurveTo(lx+16,GROUND+2,lx+32,GROUND+5);ctx.stroke();}
  }
  if(id==='hawaii'){
    // golden sand
    ctx.strokeStyle='rgba(200,160,0,0.3)';ctx.lineWidth=1;
    for(let i=0;i<10;i++){const lx=((i*72-dist*0.4)%W+W)%W;ctx.beginPath();ctx.moveTo(lx,GROUND+6);ctx.quadraticCurveTo(lx+18,GROUND+3,lx+36,GROUND+6);ctx.stroke();}
  }
}

// ════════════════════════════════
// BACKGROUND ELEMENTS
// ════════════════════════════════
function drawBgElements(){
  const id=WORLDS[currentEnvIdx].id;
  // For space, draw stars first (behind planets)
  if(id==='space'){
    ctx.fillStyle='white';
    stars.forEach(s=>{ctx.globalAlpha=s.b*Math.abs(Math.sin(Date.now()/900+s.x));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});
    ctx.globalAlpha=1;
  }
  bgElements.forEach(el=>drawBgEl(id,el));
}
function drawBgEl(id,el){
  const t=el.t||id; // fallback to world id for simple elements
  ctx.save();
  if(t==='forest'||(!el.t&&id==='forest')) { drawTree(el.x,GROUND,el.h); ctx.restore(); return; }
  if(t==='mountain'||t==='mtbg'){
    ctx.fillStyle=el.col||'#607D8B';
    ctx.beginPath();ctx.moveTo(el.x,GROUND);ctx.lineTo(el.x+el.w/2,GROUND-el.h);ctx.lineTo(el.x+el.w,GROUND);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.beginPath();ctx.moveTo(el.x+el.w/2-el.w*0.09,GROUND-el.h*0.78);ctx.lineTo(el.x+el.w/2,GROUND-el.h);ctx.lineTo(el.x+el.w/2+el.w*0.09,GROUND-el.h*0.78);ctx.fill();
    ctx.restore();return;
  }
  if(t==='dune'){
    const g=ctx.createRadialGradient(el.x+el.w/2,GROUND,2,el.x+el.w/2,GROUND-el.h,el.w/2);
    g.addColorStop(0,'#F4C430');g.addColorStop(1,'#C2851A');ctx.fillStyle=g;
    ctx.beginPath();ctx.moveTo(el.x,GROUND);ctx.quadraticCurveTo(el.x+el.w*0.3,GROUND-el.h*0.5,el.x+el.w*0.55,GROUND-el.h);ctx.quadraticCurveTo(el.x+el.w*0.75,GROUND-el.h*0.6,el.x+el.w,GROUND);ctx.fill();
    ctx.restore();return;
  }
  if(t==='camel'){
    // Simple camel silhouette
    ctx.fillStyle='rgba(139,90,43,0.55)';
    ctx.beginPath();
    // body
    ctx.ellipse(el.x+30,GROUND-el.h*0.45,28,16,0,0,Math.PI*2);ctx.fill();
    // hump
    ctx.beginPath();ctx.ellipse(el.x+20,GROUND-el.h*0.65,12,10,0,0,Math.PI*2);ctx.fill();
    // neck + head
    ctx.fillRect(el.x+38,GROUND-el.h*0.7,8,20);
    ctx.beginPath();ctx.ellipse(el.x+44,GROUND-el.h*0.75,8,6,0.3,0,Math.PI*2);ctx.fill();
    // legs
    for(let i=0;i<4;i++)ctx.fillRect(el.x+12+i*12,GROUND-el.h*0.3,5,el.h*0.3);
    ctx.restore();return;
  }
  if(t==='mosque'){
    const mx=el.x;
    // Main dome
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.beginPath();ctx.arc(mx+40,GROUND-70,35,Math.PI,0);ctx.rect(mx+5,GROUND-70,70,35);ctx.fill();
    // Minaret left
    ctx.fillStyle='rgba(210,180,140,0.65)';
    ctx.fillRect(mx-5,GROUND-95,14,60);
    ctx.beginPath();ctx.arc(mx+2,GROUND-95,7,Math.PI,0);ctx.fill();
    // Minaret right
    ctx.fillRect(mx+71,GROUND-95,14,60);
    ctx.beginPath();ctx.arc(mx+78,GROUND-95,7,Math.PI,0);ctx.fill();
    ctx.restore();return;
  }
  if(t==='arch_bg'){
    ctx.fillStyle='rgba(210,180,140,0.45)';
    ctx.beginPath();ctx.rect(el.x,GROUND-el.h,el.w,el.h);
    ctx.arc(el.x+el.w/2,GROUND-el.h,el.w/2,Math.PI,0,true);ctx.fill();
    ctx.restore();return;
  }
  if(t==='riad'){
    ctx.fillStyle='rgba(191,121,67,0.5)';
    ctx.fillRect(el.x,GROUND-el.h,el.w,el.h);
    // windows
    ctx.fillStyle='rgba(255,200,100,0.4)';
    for(let i=0;i<3;i++){ctx.fillRect(el.x+10+i*35,GROUND-el.h+15,18,25);}
    ctx.restore();return;
  }
  if(t==='palm'){
    // Palm trunk
    ctx.fillStyle='#8D6E63';ctx.fillRect(el.x+10,GROUND-el.h,8,el.h);
    // Fronds
    ctx.fillStyle='#388E3C';
    for(let a=0;a<6;a++){
      ctx.save();ctx.translate(el.x+14,GROUND-el.h);ctx.rotate((a/6)*Math.PI*2);
      ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(15,-8,28,-2);ctx.quadraticCurveTo(15,2,0,0);ctx.fill();
      ctx.restore();
    }
    ctx.restore();return;
  }
  if(t==='tower'){
    ctx.fillStyle='rgba(120,100,80,0.6)';ctx.fillRect(el.x,GROUND-el.h,el.w,el.h);
    // battlements
    ctx.fillStyle='rgba(90,75,60,0.6)';
    for(let b=0;b<5;b++)ctx.fillRect(el.x+b*12,GROUND-el.h-10,8,10);
    ctx.restore();return;
  }
  if(t==='fuji'){
    // Snow-capped Fuji
    ctx.fillStyle='rgba(120,140,160,0.45)';
    ctx.beginPath();ctx.moveTo(el.x,GROUND);ctx.lineTo(el.x+80,GROUND-100);ctx.lineTo(el.x+160,GROUND);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.beginPath();ctx.moveTo(el.x+80,GROUND-100);ctx.lineTo(el.x+60,GROUND-70);ctx.lineTo(el.x+100,GROUND-70);ctx.fill();
    ctx.restore();return;
  }
  if(t==='cherry'){
    // Cherry blossom tree
    ctx.fillStyle='#8D6E63';ctx.fillRect(el.x+10,GROUND-el.h,7,el.h);
    // Blossom cloud
    const petals=['#F48FB1','#F06292','#FCE4EC','#F8BBD0'];
    for(let p=0;p<5;p++){
      ctx.fillStyle=petals[p%4];
      ctx.globalAlpha=0.75;
      ctx.beginPath();ctx.arc(el.x+13+Math.cos(p*1.3)*16,GROUND-el.h-Math.sin(p*1.3)*10,14,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
    ctx.restore();return;
  }
  if(t==='pagoda'){
    const px=el.x;
    ctx.fillStyle='rgba(180,30,30,0.55)';
    for(let tier=0;tier<3;tier++){
      const ty=GROUND-30-tier*35,tw=80-tier*22;
      ctx.fillRect(px+40-tw/2,ty-20,tw,20);
      // curved eaves
      ctx.beginPath();ctx.moveTo(px+40-tw/2-8,ty);ctx.lineTo(px+40,ty-8);ctx.lineTo(px+40+tw/2+8,ty);ctx.lineTo(px+40+tw/2,ty-20);ctx.lineTo(px+40-tw/2,ty-20);ctx.fill();
    }
    ctx.restore();return;
  }
  if(t==='eiffel'){
    const ex=el.x+40;
    ctx.strokeStyle='rgba(80,80,80,0.7)';ctx.lineWidth=3;ctx.lineCap='round';
    // legs
    ctx.beginPath();ctx.moveTo(ex-30,GROUND);ctx.lineTo(ex,GROUND-70);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ex+30,GROUND);ctx.lineTo(ex,GROUND-70);ctx.stroke();
    // upper
    ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(ex,GROUND-70);ctx.lineTo(ex,GROUND-110);ctx.stroke();
    // crossbars
    ctx.lineWidth=1.5;
    [30,55,75].forEach(h=>{const hw=(110-h)/3.5;ctx.beginPath();ctx.moveTo(ex-hw,GROUND-h);ctx.lineTo(ex+hw,GROUND-h);ctx.stroke();});
    ctx.restore();return;
  }
  if(t==='haussmann'){
    ctx.fillStyle='rgba(200,190,170,0.45)';ctx.fillRect(el.x,GROUND-el.h,el.w,el.h);
    // mansard roof
    ctx.fillStyle='rgba(80,80,90,0.5)';ctx.beginPath();ctx.moveTo(el.x-4,GROUND-el.h);ctx.lineTo(el.x+el.w/2,GROUND-el.h-20);ctx.lineTo(el.x+el.w+4,GROUND-el.h);ctx.fill();
    ctx.restore();return;
  }
  if(t==='sagrada'){
    const sx=el.x+40;
    ctx.fillStyle='rgba(210,180,130,0.55)';
    // spires
    [sx-35,sx-15,sx,sx+15,sx+35].forEach((x,i)=>{
      const sh=80+i%2*30;
      ctx.fillRect(x-5,GROUND-sh,10,sh);
      ctx.beginPath();ctx.moveTo(x-5,GROUND-sh);ctx.lineTo(x,GROUND-sh-20);ctx.lineTo(x+5,GROUND-sh);ctx.fill();
    });
    ctx.restore();return;
  }
  if(t==='tower_bridge'){
    const bx=el.x;
    ctx.fillStyle='rgba(100,80,60,0.6)';
    // two towers
    ctx.fillRect(bx+10,GROUND-90,30,90);ctx.fillRect(bx+100,GROUND-90,30,90);
    // battlements
    for(let b=0;b<4;b++){ctx.fillRect(bx+10+b*8,GROUND-100,6,12);ctx.fillRect(bx+100+b*8,GROUND-100,6,12);}
    // bridge deck
    ctx.fillStyle='rgba(100,80,60,0.5)';ctx.fillRect(bx,GROUND-35,140,8);
    // cables
    ctx.strokeStyle='rgba(80,60,40,0.55)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(bx+25,GROUND-88);ctx.quadraticCurveTo(bx+70,GROUND-50,bx+115,GROUND-88);ctx.stroke();
    ctx.restore();return;
  }
  if(t==='bigben'){
    ctx.fillStyle='rgba(130,110,80,0.55)';
    ctx.fillRect(el.x,GROUND-100,24,100);
    // clock face
    ctx.fillStyle='rgba(200,220,200,0.6)';ctx.beginPath();ctx.arc(el.x+12,GROUND-75,10,0,Math.PI*2);ctx.fill();
    // spire
    ctx.fillStyle='rgba(100,90,70,0.6)';ctx.beginPath();ctx.moveTo(el.x,GROUND-100);ctx.lineTo(el.x+12,GROUND-125);ctx.lineTo(el.x+24,GROUND-100);ctx.fill();
    ctx.restore();return;
  }
  if(t==='london_bldg'){
    ctx.fillStyle='rgba(90,90,100,0.45)';ctx.fillRect(el.x,GROUND-el.h,el.w,el.h);
    // windows lit yellow
    ctx.fillStyle='rgba(255,230,100,0.35)';
    for(let r=0;r<3;r++)for(let c=0;c<3;c++)ctx.fillRect(el.x+8+c*26,GROUND-el.h+10+r*20,16,12);
    ctx.restore();return;
  }
  if(t==='skyscraper'){
    const g=ctx.createLinearGradient(el.x,GROUND-el.h,el.x+el.w,GROUND);
    g.addColorStop(0,'rgba(70,90,120,0.6)');g.addColorStop(1,'rgba(40,55,80,0.6)');ctx.fillStyle=g;
    ctx.fillRect(el.x,GROUND-el.h,el.w,el.h);
    // windows
    ctx.fillStyle='rgba(255,240,150,0.25)';
    for(let r=0;r<Math.floor(el.h/16);r++)for(let c=0;c<Math.floor(el.w/16);c++){
      if(Math.random()<0.6)ctx.fillRect(el.x+4+c*14,GROUND-el.h+6+r*14,8,8);
    }
    ctx.restore();return;
  }
  if(t==='liberty'){
    ctx.fillStyle='rgba(100,160,140,0.55)';
    ctx.fillRect(el.x+10,GROUND-60,12,60); // plinth
    ctx.fillRect(el.x+8,GROUND-80,16,22);  // body
    // head
    ctx.beginPath();ctx.arc(el.x+16,GROUND-88,8,0,Math.PI*2);ctx.fill();
    // torch
    ctx.fillRect(el.x+14,GROUND-100,4,14);
    ctx.fillStyle='rgba(255,200,50,0.7)';ctx.beginPath();ctx.arc(el.x+16,GROUND-102,5,0,Math.PI*2);ctx.fill();
    ctx.restore();return;
  }
  if(t==='roebling'){
    // Roebling Suspension Bridge (Cincinnati)
    const rx=el.x;
    ctx.fillStyle='rgba(80,70,60,0.55)';
    ctx.fillRect(rx+20,GROUND-80,16,80);ctx.fillRect(rx+164,GROUND-80,16,80);
    ctx.fillRect(rx,GROUND-30,200,8);
    ctx.strokeStyle='rgba(80,70,60,0.5)';ctx.lineWidth=1.5;
    // main cables
    ctx.beginPath();ctx.moveTo(rx+28,GROUND-78);ctx.quadraticCurveTo(rx+100,GROUND-20,rx+172,GROUND-78);ctx.stroke();
    // hangers
    for(let h=0;h<8;h++){
      const hx=rx+28+h*21;
      const hy=GROUND-78+(h<4?h*14:(7-h)*14);
      ctx.beginPath();ctx.moveTo(hx,hy);ctx.lineTo(hx,GROUND-30);ctx.stroke();
    }
    ctx.restore();return;
  }
  if(t==='ohio_hill'){
    ctx.fillStyle=el.col||'#5D4037';
    ctx.beginPath();ctx.moveTo(el.x,GROUND);ctx.quadraticCurveTo(el.x+el.w/2,GROUND-el.h,el.x+el.w,GROUND);ctx.fill();
    ctx.restore();return;
  }
  if(t==='falls'){
    // Niagara waterfall
    const fx=el.x;
    ctx.fillStyle='rgba(100,200,240,0.35)';ctx.fillRect(fx,GROUND-80,60,80);
    // water lines
    ctx.strokeStyle='rgba(180,240,255,0.6)';ctx.lineWidth=1.5;
    for(let w=0;w<8;w++){ctx.beginPath();ctx.moveTo(fx+w*8,GROUND-80);ctx.lineTo(fx+w*8+4,GROUND);ctx.stroke();}
    // mist
    const mg=ctx.createRadialGradient(fx+30,GROUND,2,fx+30,GROUND,50);
    mg.addColorStop(0,'rgba(200,240,255,0.4)');mg.addColorStop(1,'rgba(200,240,255,0)');
    ctx.fillStyle=mg;ctx.beginPath();ctx.arc(fx+30,GROUND,50,0,Math.PI*2);ctx.fill();
    ctx.restore();return;
  }
  if(t==='cliff'){
    ctx.fillStyle='rgba(80,100,80,0.45)';ctx.fillRect(el.x,GROUND-el.h,el.w,el.h);
    ctx.fillStyle='rgba(60,80,60,0.3)';ctx.fillRect(el.x,GROUND-el.h,el.w,10);
    ctx.restore();return;
  }
  if(t==='hawaii_vol'){
    ctx.fillStyle='rgba(80,60,60,0.45)';
    ctx.beginPath();ctx.moveTo(el.x,GROUND);ctx.lineTo(el.x+el.w*0.4,GROUND-el.h);ctx.lineTo(el.x+el.w*0.6,GROUND-el.h);ctx.lineTo(el.x+el.w,GROUND);ctx.fill();
    ctx.fillStyle='rgba(255,80,0,0.5)';ctx.beginPath();ctx.arc(el.x+el.w/2,GROUND-el.h+5,el.w*0.1,0,Math.PI*2);ctx.fill();
    ctx.restore();return;
  }
  if(t==='uluru'){
    const g=ctx.createLinearGradient(el.x,GROUND-el.h,el.x+el.w,GROUND);
    g.addColorStop(0,'rgba(180,80,30,0.65)');g.addColorStop(1,'rgba(140,50,10,0.65)');ctx.fillStyle=g;
    ctx.beginPath();ctx.moveTo(el.x,GROUND);ctx.quadraticCurveTo(el.x+el.w*0.2,GROUND-el.h,el.x+el.w*0.8,GROUND-el.h);ctx.quadraticCurveTo(el.x+el.w,GROUND-el.h*0.5,el.x+el.w,GROUND);ctx.fill();
    ctx.restore();return;
  }
  if(t==='gum'){
    // Australian gum tree
    ctx.fillStyle='#8D6E63';ctx.fillRect(el.x+10,GROUND-el.h,8,el.h);
    ctx.fillStyle='rgba(100,140,80,0.7)';
    ctx.beginPath();ctx.arc(el.x+14,GROUND-el.h,22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(120,160,90,0.5)';
    ctx.beginPath();ctx.arc(el.x+4,GROUND-el.h+8,14,0,Math.PI*2);ctx.fill();
    ctx.restore();return;
  }
  if(t==='roo'){
    // Kangaroo silhouette
    ctx.fillStyle='rgba(139,90,43,0.5)';
    // body
    ctx.beginPath();ctx.ellipse(el.x+18,GROUND-30,14,18,0.4,0,Math.PI*2);ctx.fill();
    // head on long neck
    ctx.fillRect(el.x+25,GROUND-52,7,18);
    ctx.beginPath();ctx.ellipse(el.x+30,GROUND-55,7,5,0.2,0,Math.PI*2);ctx.fill();
    // ears
    ctx.fillRect(el.x+28,GROUND-62,4,10);ctx.fillRect(el.x+33,GROUND-62,4,10);
    // tail
    ctx.beginPath();ctx.moveTo(el.x+4,GROUND-20);ctx.quadraticCurveTo(el.x-10,GROUND-10,el.x-5,GROUND);ctx.lineWidth=5;ctx.strokeStyle='rgba(139,90,43,0.5)';ctx.stroke();
    // legs
    ctx.fillRect(el.x+14,GROUND-16,6,16);ctx.fillRect(el.x+22,GROUND-16,6,16);
    ctx.restore();return;
  }
  // Pyramid (default fallback for pyramid world)
  if(!el.t&&id==='pyramid'){
    const g=ctx.createLinearGradient(el.x,GROUND-el.h,el.x+el.w,GROUND);g.addColorStop(0,'#C2891A');g.addColorStop(1,'#8B6914');ctx.fillStyle=g;
    ctx.beginPath();ctx.moveTo(el.x,GROUND);ctx.lineTo(el.x+el.w/2,GROUND-el.h);ctx.lineTo(el.x+el.w,GROUND);ctx.fill();
    ctx.strokeStyle='rgba(139,105,20,0.5)';ctx.lineWidth=1;
    for(let r=1;r<4;r++){const y=GROUND-el.h*r/4;const hw=el.w/2*(1-r/4);ctx.beginPath();ctx.moveTo(el.x+el.w/2-hw,y);ctx.lineTo(el.x+el.w/2+hw,y);ctx.stroke();}
    ctx.restore();return;
  }
  // Volcano (default fallback)
  if(!el.t&&id==='volcano'){
    ctx.fillStyle=el.col||'#424242';ctx.beginPath();ctx.moveTo(el.x,GROUND);ctx.lineTo(el.x+el.w*0.3,GROUND-el.h*0.6);ctx.lineTo(el.x+el.w*0.4,GROUND-el.h);ctx.lineTo(el.x+el.w*0.6,GROUND-el.h);ctx.lineTo(el.x+el.w*0.7,GROUND-el.h*0.6);ctx.lineTo(el.x+el.w,GROUND);ctx.fill();
    ctx.fillStyle='rgba(255,80,0,0.72)';ctx.beginPath();ctx.arc(el.x+el.w/2,GROUND-el.h+6,el.w*0.11,0,Math.PI*2);ctx.fill();
    if(Math.random()<0.04)particles.push({x:el.x+el.w/2+(-5+Math.random()*10),y:GROUND-el.h,vx:-1+Math.random()*2,vy:-2-Math.random()*2,life:0.8,color:'#FF5722',r:2+Math.random()*2});
    ctx.restore();return;
  }
  // Arctic iceberg
  if(el.pts){
    ctx.fillStyle=el.col||'rgba(179,229,252,0.7)';ctx.beginPath();const pts=el.pts;ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.55)';ctx.lineWidth=1.4;ctx.stroke();
    ctx.restore();return;
  }
  // Space planets
  if(el.r!==undefined){
    const g=ctx.createRadialGradient(el.x-el.r*0.3,el.y-el.r*0.3,el.r*0.1,el.x,el.y,el.r);
    g.addColorStop(0,el.c2||'#fff');g.addColorStop(1,el.c1||'#888');ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(el.x,el.y,el.r,0,Math.PI*2);ctx.fill();
    if(el.ring){ctx.strokeStyle=el.c1;ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(el.x,el.y,el.r*1.6,el.r*0.38,0.3,0,Math.PI*2);ctx.stroke();}
    ctx.fillStyle='white';stars.forEach(s=>{ctx.globalAlpha=s.b*Math.abs(Math.sin(Date.now()/900+s.x));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});
    ctx.globalAlpha=1;
    ctx.restore();return;
  }
  ctx.restore();
}

// OBSTACLES

function drawObstacle(obs,single=true){
  const x=obs.x,y=GROUND+fox.h,h=obs.h,w=single?obs.w:obs.w1;
  const t=WORLDS[currentEnvIdx].obsType;
  if(t==='fence')       drawFence(x,y,w,h);
  else if(t==='rock')        drawRock(x,y,w,h);
  else if(t==='sandblock')   drawSandBlock(x,y,w,h);
  else if(t==='iceblock')    drawIceBlock(x,y,w,h);
  else if(t==='lavarock')    drawLavaRock(x,y,w,h);
  else if(t==='meteor')      drawMeteor(x,y,w,h);
  else if(t==='camel_post')  drawCamelPost(x,y,w,h);
  else if(t==='archway')     drawArchway(x,y,w,h);
  else if(t==='lantern_post')drawLanternPost(x,y,w,h);
  else if(t==='wall_block')  drawWallBlock(x,y,w,h);
  else if(t==='torii')       drawTorii(x,y,w,h);
  else if(t==='bollard')     drawBollard(x,y,w,h);
  else if(t==='arch_tile')   drawArchTile(x,y,w,h);
  else if(t==='red_box')     drawRedBox(x,y,w,h);
  else if(t==='hydrant')     drawHydrant(x,y,w,h);
  else if(t==='arch_steel')  drawArchSteel(x,y,w,h);
  else if(t==='barrel')      drawBarrel(x,y,w,h);
  else if(t==='tiki')        drawTiki(x,y,w,h);
  else drawFence(x,y,w,h);
}
// ── NEW OBSTACLE TYPES ────────────────────────────────────────
function drawCamelPost(x,y,w,h){
  // Wooden post with a camel silhouette carving
  ctx.fillStyle='#A0724A';ctx.fillRect(x+w/2-5,y-h,10,h);
  ctx.fillStyle='#C8956C';ctx.fillRect(x,y-h*0.65,w,8);
  // Mini camel carving on top
  ctx.fillStyle='#8B5E3C';
  ctx.beginPath();ctx.ellipse(x+w/2,y-h-10,12,7,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+w/2-5,y-h-15,6,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(x+4,y+2,w,5);
}
function drawArchway(x,y,w,h){
  // Moroccan arch / keyhole arch shape
  ctx.fillStyle='#D4C4A8';ctx.fillRect(x,y-h,w,h);
  // Arch cutout
  ctx.fillStyle='rgba(100,140,180,0.35)';
  ctx.beginPath();ctx.rect(x+w*0.2,y-h*0.45,w*0.6,h*0.45);
  ctx.arc(x+w*0.5,y-h*0.45,w*0.3,Math.PI,0,true);ctx.fill();
  // Tiles
  ctx.strokeStyle='rgba(180,150,100,0.5)';ctx.lineWidth=1;
  for(let r=0;r<3;r++)for(let c=0;c<3;c++){ctx.beginPath();ctx.rect(x+2+c*(w/3),y-h+2+r*(h/4),w/3-2,h/4-2);ctx.stroke();}
  ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(x+4,y+2,w,5);
}
function drawLanternPost(x,y,w,h){
  ctx.fillStyle='#8B4513';ctx.fillRect(x+w/2-4,y-h,8,h);
  ctx.fillStyle='rgba(255,160,30,0.85)';
  // Lantern body
  ctx.beginPath();ctx.rect(x+w/2-10,y-h-18,20,16);ctx.fill();
  // Lantern glow
  const lg=ctx.createRadialGradient(x+w/2,y-h-10,2,x+w/2,y-h-10,18);
  lg.addColorStop(0,'rgba(255,200,50,0.5)');lg.addColorStop(1,'rgba(255,200,50,0)');
  ctx.fillStyle=lg;ctx.beginPath();ctx.arc(x+w/2,y-h-10,18,0,Math.PI*2);ctx.fill();
  // Horizontal bar
  ctx.fillStyle='#8B4513';ctx.fillRect(x,y-h*0.5,w,7);
  ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(x+4,y+2,w,5);
}
function drawWallBlock(x,y,w,h){
  // Great Wall stone blocks
  const g=ctx.createLinearGradient(x,y-h,x,y);g.addColorStop(0,'#A0937D');g.addColorStop(1,'#7D6655');ctx.fillStyle=g;ctx.fillRect(x,y-h,w,h);
  ctx.strokeStyle='rgba(80,60,50,0.45)';ctx.lineWidth=2;
  for(let r=0;r<4;r++){ctx.beginPath();ctx.moveTo(x,y-h*r/4);ctx.lineTo(x+w,y-h*r/4);ctx.stroke();}
  // Battlement on top
  ctx.fillStyle='#8D7A68';
  for(let b=0;b<Math.floor(w/14);b++)ctx.fillRect(x+b*14,y-h-10,9,10);
  ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(x+4,y+2,w,5);
}
function drawTorii(x,y,w,h){
  // Japanese Torii gate - iconic red gate
  ctx.fillStyle='#C0392B';
  // Two posts
  ctx.fillRect(x+w*0.12,y-h,w*0.12,h);ctx.fillRect(x+w*0.76,y-h,w*0.12,h);
  // Top rail (slightly curved upward at ends)
  ctx.fillRect(x,y-h,w,h*0.12);
  ctx.beginPath();ctx.moveTo(x-6,y-h+h*0.06);ctx.lineTo(x+w/2,y-h-h*0.08);ctx.lineTo(x+w+6,y-h+h*0.06);ctx.lineTo(x+w,y-h+h*0.12);ctx.lineTo(x,y-h+h*0.12);ctx.fill();
  // Second rail
  ctx.fillRect(x+w*0.06,y-h*0.62,w*0.88,h*0.1);
  ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(x+4,y+2,w,5);
}
function drawBollard(x,y,w,h){
  // Parisian stone bollard / post
  const c=x+w/2;
  ctx.fillStyle='#9E9E9E';
  ctx.beginPath();ctx.rect(c-6,y-h+8,12,h-8);ctx.fill();
  // Top ball
  ctx.beginPath();ctx.arc(c,y-h+8,10,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.arc(c-3,y-h+4,4,0,Math.PI*2);ctx.fill();
  // Base flare
  ctx.fillStyle='#757575';ctx.beginPath();ctx.moveTo(c-12,y);ctx.lineTo(c-6,y-8);ctx.lineTo(c+6,y-8);ctx.lineTo(c+12,y);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(x+4,y+2,w,5);
}
function drawArchTile(x,y,w,h){
  // Barcelona Gaudi-style coloured arch
  const g=ctx.createLinearGradient(x,y-h,x+w,y);
  g.addColorStop(0,'#FF8F00');g.addColorStop(0.5,'#F57F17');g.addColorStop(1,'#E65100');ctx.fillStyle=g;
  ctx.fillRect(x,y-h,w,h);
  // Mosaic pattern
  const colours=['#FFD600','#FF6D00','#00BCD4','#E91E63','#4CAF50'];
  for(let r=0;r<5;r++)for(let c=0;c<4;c++){
    ctx.fillStyle=colours[(r+c)%colours.length];ctx.globalAlpha=0.45;
    ctx.beginPath();ctx.rect(x+2+c*(w/4),y-h+2+r*(h/5),w/4-3,h/5-3);ctx.fill();
  }
  ctx.globalAlpha=1;
  // Arch on top
  ctx.fillStyle='rgba(255,200,50,0.7)';
  ctx.beginPath();ctx.arc(x+w/2,y-h,w/2,Math.PI,0);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(x+4,y+2,w,5);
}
function drawRedBox(x,y,w,h){
  // British red phone box / post box
  ctx.fillStyle='#C62828';ctx.fillRect(x,y-h,w,h);
  // Crown on top
  ctx.fillStyle='#B71C1C';
  ctx.beginPath();ctx.moveTo(x,y-h);ctx.lineTo(x+w/2,y-h-10);ctx.lineTo(x+w,y-h);ctx.fill();
  // Window panels
  ctx.fillStyle='rgba(200,230,255,0.5)';
  ctx.fillRect(x+4,y-h+8,w-8,h*0.45);
  ctx.strokeStyle='#8B0000';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x+w/2,y-h+8);ctx.lineTo(x+w/2,y-h+8+h*0.45);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+4,y-h+8+h*0.22);ctx.lineTo(x+w-4,y-h+8+h*0.22);ctx.stroke();
  ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(x+4,y+2,w,5);
}
function drawHydrant(x,y,w,h){
  // NYC fire hydrant - yellow
  const c=x+w/2;
  ctx.fillStyle='#F9A825';
  ctx.fillRect(c-10,y-h+h*0.3,20,h*0.7);        // body
  ctx.fillRect(c-14,y-h+h*0.55,28,h*0.15);       // middle flange
  ctx.fillRect(c-12,y-h+h*0.82,24,h*0.18);       // base
  ctx.beginPath();ctx.arc(c,y-h+h*0.3,10,0,Math.PI*2);ctx.fill(); // top cap
  ctx.fillStyle='#F57F17';
  // Side nozzles
  ctx.fillRect(c-20,y-h+h*0.4,8,10);ctx.fillRect(c+12,y-h+h*0.4,8,10);
  ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(x+4,y+2,w,5);
}
function drawArchSteel(x,y,w,h){
  // Steel arch bridge segment (Cincinnati style)
  ctx.strokeStyle='#546E7A';ctx.lineWidth=4;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x,y);ctx.quadraticCurveTo(x+w/2,y-h*1.3,x+w,y);ctx.stroke();
  ctx.lineWidth=2;ctx.strokeStyle='#78909C';
  for(let i=1;i<5;i++){
    const hx=x+w*i/5;const hy=y-h*1.3*Math.sin(Math.PI*i/5)*0.9;
    ctx.beginPath();ctx.moveTo(hx,y);ctx.lineTo(hx,hy);ctx.stroke();
  }
  // Road deck
  ctx.fillStyle='#607D8B';ctx.fillRect(x,y-6,w,8);
  ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(x+4,y+2,w,5);
}
function drawBarrel(x,y,w,h){
  // Niagara barrel / wooden cask
  const g=ctx.createLinearGradient(x,y-h,x+w,y);g.addColorStop(0,'#8D6E63');g.addColorStop(0.5,'#6D4C41');g.addColorStop(1,'#4E342E');ctx.fillStyle=g;
  ctx.beginPath();ctx.ellipse(x+w/2,y-h/2,w/2,h/2,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#37474F';ctx.lineWidth=3;
  [-h*0.3,0,h*0.3].forEach(off=>{ctx.beginPath();ctx.ellipse(x+w/2,y-h/2+off,w/2,h*0.15,0,0,Math.PI*2);ctx.stroke();});
  ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(x+4,y+2,w,5);
}
function drawTiki(x,y,w,h){
  // Hawaiian tiki torch
  const c=x+w/2;
  ctx.fillStyle='#8D6E63';ctx.fillRect(c-4,y-h,8,h);
  // Torch head
  ctx.fillStyle='#5D4037';ctx.fillRect(c-9,y-h,18,h*0.28);
  // Flame
  const flame=['#FF6D00','#FF9100','#FFCA28'];
  flame.forEach((fc,i)=>{
    ctx.fillStyle=fc;
    ctx.beginPath();ctx.moveTo(c,y-h-28+i*6);ctx.quadraticCurveTo(c+8-i*3,y-h-14+i*5,c,y-h-i*3);ctx.quadraticCurveTo(c-8+i*3,y-h-14+i*5,c,y-h-28+i*6);ctx.fill();
  });
  // Tiki face carvings
  ctx.fillStyle='rgba(60,30,10,0.7)';
  ctx.fillRect(c-4,y-h*0.4,3,3);ctx.fillRect(c+1,y-h*0.4,3,3); // eyes
  ctx.beginPath();ctx.arc(c,y-h*0.28,4,0,Math.PI);ctx.stroke(); // mouth
  ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(x+4,y+2,w,5);
}
function drawFence(x,y,w,h){
  ctx.fillStyle='#8B5E3C';ctx.fillRect(x,y-h+10,10,h);ctx.fillRect(x+w-10,y-h+10,10,h);
  ctx.fillStyle='#A0724A';ctx.fillRect(x,y-h*0.7,w,8);ctx.fillRect(x,y-h*0.35,w,8);
  ctx.fillStyle='#C8956C';for(let px=x+10;px<x+w-14;px+=14)ctx.fillRect(px,y-h+10,10,h-4);
  ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(x+4,y+2,w,5);
}
function drawRock(x,y,w,h){

function drawTree(x,y,h){

function drawCloud(x,y,w){

function drawCoin(x,y,frame){

}
function drawFox(x,y,frame,invincible,blinking){

  ctx.fillStyle='rgba(0,0,0,0.15)';ctx.beginPath();ctx.ellipse(0,2,24,6,0,0,Math.PI*2);ctx.fill();

  ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(-2,-22,20,14,0.1,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFE4B5';ctx.beginPath();ctx.ellipse(0,-17,11,9,0.15,0,Math.PI*2);ctx.fill();
  ctx.save();const tw=Math.sin(frame*0.6)*0.3;ctx.rotate(tw);
  const tg=ctx.createLinearGradient(-30,-10,-10,-35);tg.addColorStop(0,'#D94F00');tg.addColorStop(0.7,'#FF8C00');tg.addColorStop(1,'#fff');
  ctx.fillStyle=tg;ctx.beginPath();ctx.moveTo(-10,-18);ctx.bezierCurveTo(-30,-20,-38,-5,-28,5);ctx.bezierCurveTo(-20,12,-10,0,-10,-18);ctx.fill();ctx.restore();
  const ls=Math.sin(frame*0.5)*12;ctx.strokeStyle='#D94F00';ctx.lineWidth=5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(6,-10);ctx.lineTo(6+ls/2,0);ctx.stroke();ctx.beginPath();ctx.moveTo(6,-10);ctx.lineTo(6-ls/2+3,0);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-10,-10);ctx.lineTo(-10-ls/2,0);ctx.stroke();ctx.beginPath();ctx.moveTo(-10,-10);ctx.lineTo(-10+ls/2,0);ctx.stroke();
  const hg=ctx.createRadialGradient(8,-34,2,8,-34,18);hg.addColorStop(0,'#FF9500');hg.addColorStop(1,'#D94F00');
  ctx.fillStyle=hg;ctx.beginPath();ctx.ellipse(8,-34,16,14,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#D94F00';ctx.beginPath();ctx.moveTo(-2,-44);ctx.lineTo(2,-58);ctx.lineTo(10,-44);ctx.fill();ctx.beginPath();ctx.moveTo(12,-44);ctx.lineTo(18,-56);ctx.lineTo(22,-44);ctx.fill();
  ctx.fillStyle='#FFB3A0';ctx.beginPath();ctx.moveTo(0,-46);ctx.lineTo(3,-55);ctx.lineTo(8,-46);ctx.fill();ctx.beginPath();ctx.moveTo(14,-46);ctx.lineTo(17,-54);ctx.lineTo(20,-46);ctx.fill();
  ctx.fillStyle='#FFE4B5';ctx.beginPath();ctx.ellipse(18,-32,9,7,0.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#333';ctx.beginPath();ctx.ellipse(23,-30,3,2.5,0,0,Math.PI*2);ctx.fill();
  const eo=!blinking||Math.floor(Date.now()/150)%8!==0;
  if(eo){
    ctx.fillStyle='#222';ctx.beginPath();ctx.arc(6,-37,3.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(17,-37,3.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='white';ctx.beginPath();ctx.arc(7,-38,1.2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(18,-38,1.2,0,Math.PI*2);ctx.fill();
  } else {
    ctx.strokeStyle='#222';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(3,-37);ctx.lineTo(10,-37);ctx.stroke();ctx.beginPath();ctx.moveTo(14,-37);ctx.lineTo(21,-37);ctx.stroke();
  }
  ctx.strokeStyle='#6B3A00';ctx.lineWidth=1.8;ctx.beginPath();ctx.arc(18,-30,4,0.1,Math.PI*0.9);ctx.stroke();
  ctx.strokeStyle='rgba(100,60,0,0.5)';ctx.lineWidth=1;
  [-2,0,2].forEach(dy=>{ctx.beginPath();ctx.moveTo(24,-30+dy);ctx.lineTo(36,-29+dy*0.5);ctx.stroke();});
  ctx.restore();
}
function spawnParticles(x,y,color,count=8){
  for(let i=0;i<count;i++){const a=(Math.PI*2/count)*i+Math.random()*0.5;particles.push({x,y,vx:Math.cos(a)*(2+Math.random()*4),vy:Math.sin(a)*(2+Math.random()*4)-2,life:1,color,r:3+Math.random()*4});}
}

// ════════════════════════════════
// MILESTONE / ENV TRANSITION
// ════════════════════════════════
function checkMilestone(){
  if(currentEnvIdx>=WORLDS.length-1)return;
  const prevScore=currentEnvIdx>0?WORLDS[currentEnvIdx-1].milestone:0;
  const nextScore=WORLDS[currentEnvIdx].milestone;
  const prog=Math.min(1,(score-prevScore)/(nextScore-prevScore));
  document.getElementById('milestoneProgress').style.width=(prog*100)+'%';
  if(score>=nextScore) triggerTransition();
}
function triggerTransition(){
  currentEnvIdx++;
  currentEnv=WORLDS[currentEnvIdx].id;
  lives=Math.min(lives+1,6);
  document.getElementById('livesDisp').textContent=lives;
  document.getElementById('envBadge').textContent=WORLDS[currentEnvIdx].name;
  document.getElementById('milestoneProgress').style.width='0%';
  rebuildBg();
  stopBgMusic(); playMilestone(); startBgMusic();
  const to=document.getElementById('transOverlay');
  const tt=document.getElementById('transText');
  const w=WORLDS[currentEnvIdx];
  tt.innerHTML=`<div>${w.emoji} ${w.name}</div><div style="font-size:0.78em;font-family:Nunito,sans-serif;color:#FFD700;margin-top:2px">+1 Life ❤️</div>`;
  to.style.display='flex';to.style.background='rgba(0,0,0,0)';
  // Never block the game — just a subtle fade, max 20% opacity
  setTimeout(()=>{to.style.background='rgba(0,0,0,0.18)';},60);
  setTimeout(()=>{to.style.background='rgba(0,0,0,0)';},900);
  setTimeout(()=>{to.style.display='none';},1200);
  mileBannerText=`${w.name} reached! +❤️`;mileBannerTimer=150;
  spawnParticles(W/2,H/2,'#FFD700',20);
}

// ════════════════════════════════
// OBSTACLES / COINS SPAWN
// ════════════════════════════════
function spawnObstacle(){
  const h=35+Math.random()*32,w=26+Math.random()*20;
  const type=Math.random()<0.15?'double':'single';
  const gap=type==='double'?22+Math.random()*18:0;
  obstacles.push({x:W+20,w:type==='double'?w*2+gap:w,h,type,gap,w1:w});
}
function spawnCoin(){coins.push({x:W+20,y:GROUND-55-Math.random()*60,frame:0});}

// ════════════════════════════════
// HIT TESTS
// ════════════════════════════════
function hitObstacle(f,obs){
  const m=8,fx1=f.x+m,fx2=f.x+f.w-m,fy2=f.y+f.h;
  if(obs.type==='double'){
    const oy=GROUND+f.h-obs.h;
    return (fx2>obs.x&&fx1<obs.x+obs.w1&&fy2>oy)||(fx2>obs.x+obs.w1+obs.gap&&fx1<obs.x+obs.w&&fy2>oy);
  }
  return fx2>obs.x&&fx1<obs.x+obs.w&&fy2>GROUND+f.h-obs.h;
}
function hitCoin(f,c){return f.x+f.w>c.x+2&&f.x<c.x+22&&f.y+f.h>c.y+2&&f.y<c.y+22;}

// ════════════════════════════════
// UPDATE
// ════════════════════════════════
function update(dt){
  const dtF=dt/16.67;
  fox.frame++;
  level=1+Math.floor(score/300);
  gameSpeed=3+(level-1)*0.65;
  obsInterval=Math.max(50,120-(level-1)*10);
  if(level!==lastLevel){
    lastLevel=level;playLevelUp();
    levelBannerText=`Level ${level}!`;levelBannerTimer=110;
    document.getElementById('levelDisp').textContent=level;
    spawnParticles(fox.x+fox.w/2,fox.y,'#FFD700',14);
  }
  const tVx=keys.right?gameSpeed*0.5:keys.left?-gameSpeed*0.4:0;
  fox.vx+=(tVx-fox.vx)*0.18;
  const spaceDown=keys.space&&!keys.spacePrev;
  if(spaceDown){
    if(fox.onGround){fox.vy=-14;fox.onGround=false;fox.jumping=true;fox.djUsed=false;playJump();}
    else if(!fox.djUsed){fox.vy=-12;fox.djUsed=true;playJump();spawnParticles(fox.x+fox.w/2,fox.y+fox.h,'#FFE44D',6);}
  }
  keys.spacePrev=keys.space;
  fox.vy+=0.7*dtF;fox.y+=fox.vy*dtF;fox.x+=fox.vx*dtF;
  fox.x=Math.max(0,Math.min(W-fox.w,fox.x));
  if(fox.y>=GROUND){if(!fox.onGround){playLand();spawnParticles(fox.x+fox.w/2,GROUND+fox.h,'#8B5E3C',5);}fox.y=GROUND;fox.vy=0;fox.onGround=true;fox.jumping=false;fox.djUsed=false;}
  if(fox.invincible){fox.invTimer--;if(fox.invTimer<=0){fox.invincible=false;fox.blinking=false;}}
  obsTimer++;
  if(obsTimer>=obsInterval){obsTimer=0;spawnObstacle();}
  for(let i=obstacles.length-1;i>=0;i--){
    obstacles[i].x-=gameSpeed*dtF;
    if(obstacles[i].x+obstacles[i].w<-20){obstacles.splice(i,1);score+=10;continue;}
    if(!fox.invincible&&hitObstacle(fox,obstacles[i])){
      playHurt();lives--;document.getElementById('livesDisp').textContent=lives;
      spawnParticles(fox.x+fox.w/2,fox.y+fox.h/2,'#FF4444',12);
      fox.invincible=true;fox.blinking=true;fox.invTimer=90;fox.vy=-8;
      if(lives<=0){endGame();return;}
    }
  }
  coinTimer++;
  if(coinTimer>75){coinTimer=0;if(Math.random()<0.42)spawnCoin();}
  for(let i=coins.length-1;i>=0;i--){
    coins[i].x-=gameSpeed*0.9*dtF;coins[i].frame++;
    if(coins[i].x<-30){coins.splice(i,1);continue;}
    if(hitCoin(fox,coins[i])){
      playCollect();score+=25;
      spawnParticles(coins[i].x+12,coins[i].y+12,'#FFD700',8);
      addPopup('+25',coins[i].x,coins[i].y,'#FFD700');
      coins.splice(i,1);
    }
  }
  clouds.forEach(c=>{c.x-=c.speed*dtF;if(c.x+c.w<0)c.x=W+c.w;});
  scrollBg(dtF);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.03;});
  particles=particles.filter(p=>p.life>0);
  dist+=gameSpeed*dtF;score++;
  document.getElementById('scoreDisp').textContent=score;
  checkMilestone();
}

// ════════════════════════════════
// RENDER
// ════════════════════════════════
function render(){
  ctx.clearRect(0,0,W,H);
  drawSky();
  if(currentEnvIdx!==5)clouds.forEach(c=>drawCloud(c.x,c.y,c.w));
  drawBgElements();
  drawGround();
  coins.forEach(c=>drawCoin(c.x,c.y,c.frame));
  obstacles.forEach(obs=>{
    if(obs.type==='double'){
      drawObstacle({...obs,x:obs.x},false);
      drawObstacle({...obs,x:obs.x+obs.w1+obs.gap},false);
    } else drawObstacle(obs,true);
  });
  drawFox(fox.x,fox.y,fox.frame,fox.invincible,fox.blinking);
  particles.forEach(p=>{ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();});
  // banners
  if(levelBannerTimer>0){
    const a=Math.min(1,levelBannerTimer/20);
    ctx.save();ctx.globalAlpha=a;ctx.fillStyle='rgba(0,0,0,0.52)';ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(W/2-88,H/2-24,176,48,12);else ctx.rect(W/2-88,H/2-24,176,48);
    ctx.fill();ctx.fillStyle='#FFD700';ctx.font='bold 26px Fredoka One,cursive';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🚀 '+levelBannerText,W/2,H/2);ctx.restore();levelBannerTimer--;
  }
  if(mileBannerTimer>0){
    const a=Math.min(1,mileBannerTimer/20);
    ctx.save();ctx.globalAlpha=a;ctx.fillStyle='rgba(255,215,0,0.16)';
    if(ctx.roundRect)ctx.roundRect(W/2-158,H/2-44,316,56,12);else ctx.rect(W/2-158,H/2-44,316,56);
    ctx.fill();ctx.strokeStyle='rgba(255,215,0,0.55)';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='white';ctx.font='bold 20px Fredoka One,cursive';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🎉 '+mileBannerText,W/2,H/2-18);ctx.restore();mileBannerTimer--;
  }
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='10px Nunito,sans-serif';ctx.textAlign='left';ctx.fillText(`Speed: ${gameSpeed.toFixed(1)}x`,6,H-6);
}

// ════════════════════════════════
// POPUP
// ════════════════════════════════
function addPopup(text,x,y,color){
  const p=document.createElement('div');p.className='popup';
  p.style.left=(x/W*100)+'%';p.style.top=(y/H*100)+'%';p.style.color=color;p.textContent=text;
  document.getElementById('scorePopups').appendChild(p);setTimeout(()=>p.remove(),900);
}

// ════════════════════════════════
// GAME LOOP
// ════════════════════════════════
function loop(time){
  if(!gameRunning||gamePaused)return;
  const dt=Math.min(time-lastTime,50);lastTime=time;
  update(dt);render();
  frameId=requestAnimationFrame(loop);
}

// ════════════════════════════════
// PAUSE
// ════════════════════════════════
function togglePause(){
  if(!gameRunning)return;
  gamePaused=!gamePaused;
  document.getElementById('pauseOverlay').style.display=gamePaused?'flex':'none';
  document.getElementById('pauseBtn').textContent=gamePaused?'▶':'⏸';
  if(gamePaused){stopBgMusic();}
  else{startBgMusic();lastTime=performance.now();frameId=requestAnimationFrame(loop);}
}
document.addEventListener('keydown',e=>{if(e.code==='Escape'||e.code==='KeyP')togglePause();});

function quitToMenu(){
  gameRunning=false;gamePaused=false;stopBgMusic();cancelAnimationFrame(frameId);
  document.getElementById('pauseOverlay').style.display='none';
  showMenu(true);
}

// ════════════════════════════════
// START / END
// ════════════════════════════════
function resetFox(){fox.x=120;fox.y=GROUND;fox.vy=0;fox.vx=0;fox.onGround=true;fox.jumping=false;fox.frame=0;fox.invincible=false;fox.invTimer=0;fox.djUsed=false;fox.blinking=false;}

function handleStart(){
  const nm=document.getElementById('nameInput').value.trim();
  if(!nm){document.getElementById('nameInput').focus();document.getElementById('nameInput').style.borderColor='#f55';setTimeout(()=>document.getElementById('nameInput').style.borderColor='',1000);return;}
  playerName=nm;localStorage.setItem('jumpyFoxName',nm);
  startGame();
}
function startGame(){
  initAudio();
  document.getElementById('overlay').style.display='none';
  score=0;lives=3;level=1;lastLevel=1;dist=0;obsTimer=0;coinTimer=0;gameSpeed=3;
  obstacles=[];coins=[];particles=[];
  currentEnvIdx=0;currentEnv='forest';
  document.getElementById('envBadge').textContent=WORLDS[0].name;
  document.getElementById('scoreDisp').textContent='0';
  document.getElementById('livesDisp').textContent='3';
  document.getElementById('levelDisp').textContent='1';
  document.getElementById('milestoneProgress').style.width='0%';
  levelBannerTimer=0;mileBannerTimer=0;
  resetFox();initWorld();
  gameRunning=true;gamePaused=false;
  document.getElementById('pauseBtn').textContent='⏸';
  startBgMusic();lastTime=performance.now();frameId=requestAnimationFrame(loop);
}
async function endGame(){
  gameRunning=false;stopBgMusic();cancelAnimationFrame(frameId);playGameOver();
  if(score>highScore){highScore=score;localStorage.setItem('jumpyFoxHS',highScore);}
  // Show game-over screen immediately while save happens in background
  showMenu(false);
  // Save score and then refresh leaderboard once saved
  if(playerName && score > 0){
    await saveScore(playerName, score, WORLDS[currentEnvIdx].name);
    // Refresh leaderboard after save so new score appears
    await renderLeaderboard(playerName, score);
  }
}

// ════════════════════════════════
// MENU / SCOREBOARD
// ════════════════════════════════
async function showMenu(isQuit){
  document.getElementById('overlayTitle').textContent=isQuit?'🦊 Jumpy Fox':'🦊 Game Over!';
  document.getElementById('overlayMsg').innerHTML=isQuit
    ?'Help Foxy run through amazing worlds!<br>Use <b>← →</b> arrows + <b>SPACE</b> to jump!<br><span style="font-family:Nunito,sans-serif;font-size:0.85em;opacity:0.75">📱 Tap screen to jump on mobile</span>'
    :`You scored <b style="color:#FFD700">${score}</b> points!<br>You reached <b>${WORLDS[currentEnvIdx].name}</b>!${score>=highScore?'<br>🎉 New Best!':''}`;
  document.getElementById('highscoreDisp').textContent=highScore>0?`🏆 Your Best: ${highScore}`:'';
  document.getElementById('nameInput').value=playerName;
  document.getElementById('overlay').style.display='flex';
  await renderLeaderboard(playerName,isQuit?null:score);
}
async function renderLeaderboard(myName,myScore){
  const sbRows=document.getElementById('sbRows');
  sbRows.innerHTML='<div id="sbLoading">Loading scores… 🦊</div>';
  let rows=[];
  try{ rows=await loadLeaderboard(); } catch(e){}
  if(!rows||rows.length===0){
    sbRows.innerHTML='<div id="sbLoading" style="color:#aaa;padding:12px">No scores yet — be the first! 🦊<br><span style="font-size:11px;color:#555">Check Supabase RLS policies if scores are missing.</span></div>';
    return;
  }
  // Find if my name is already in top 5
  const myKey=myName?myName.trim().toLowerCase():'';
  let meIdx=-1;
  if(myKey) meIdx=rows.findIndex(r=>r.player_name.trim().toLowerCase()===myKey);
  sbRows.innerHTML='';
  rows.forEach((r,i)=>{
    const isMe=i===meIdx;
    const div=document.createElement('div');
    div.className='sb-row'+(isMe?' me':'');
    const medal=['🥇','🥈','🥉'][i]||`${i+1}`;
    const worldLabel=r.world?`<span class="wld">${r.world}</span>`:'';
    div.innerHTML=`<span class="rank">${medal}</span><span class="nm">${esc(r.player_name)}</span>${worldLabel}<span class="pts">${Number(r.score).toLocaleString()}</span>`;
    sbRows.appendChild(div);
  });
  // If player is not in top 5 but just played, show them below with a separator
  if(meIdx===-1&&myName&&myScore!==null){
    const sep=document.createElement('div');
    sep.style.cssText='border-top:1px dashed rgba(255,215,0,0.25);margin:2px 0;';
    sbRows.appendChild(sep);
    const div=document.createElement('div');div.className='sb-row me';
    const myWorld=WORLDS[currentEnvIdx]?WORLDS[currentEnvIdx].name:'';
    div.innerHTML=`<span class="rank">—</span><span class="nm">▶ ${esc(myName)}</span><span class="wld">${myWorld}</span><span class="pts">${myScore.toLocaleString()}</span>`;
    sbRows.appendChild(div);
  }
}
function esc(s){return String(s).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));}

// ════════════════════════════════
// INPUT
// ════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft')keys.left=true;
  if(e.code==='ArrowRight')keys.right=true;
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();keys.space=true;}
});
document.addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft')keys.left=false;
  if(e.code==='ArrowRight')keys.right=false;
  if(e.code==='Space'||e.code==='ArrowUp')keys.space=false;
});
document.getElementById('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')handleStart();});
function mDown(btn,action){
  btn.addEventListener('touchstart',e=>{e.preventDefault();action(true);initAudio();},{passive:false});
  btn.addEventListener('touchend',e=>{e.preventDefault();action(false);},{passive:false});
}
mDown(document.getElementById('leftBtn'),v=>keys.left=v);
mDown(document.getElementById('rightBtn'),v=>keys.right=v);
mDown(document.getElementById('jumpMBtn'),v=>keys.space=v);

// Tapping the canvas = JUMP (works on all touchscreens)
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  initAudio();
  if(gameRunning && !gamePaused){
    keys.space=true;
    // auto-release after a short moment so it acts like a tap
    setTimeout(()=>{ keys.space=false; }, 120);
  }
},{passive:false});

// Show mobile controls whenever the screen is touch-capable OR narrow
function checkMobileControls(){
  const isTouch = navigator.maxTouchPoints > 0 || 'ontouchstart' in window;
  const isNarrow = window.innerWidth < 700;
  document.getElementById('mobileControls').style.display = (isTouch || isNarrow) ? 'flex' : 'none';
}
checkMobileControls();
window.addEventListener('resize', checkMobileControls);

// ════════════════════════════════
// BOOT
// ════════════════════════════════
initWorld();
(function boot(){drawSky();clouds.forEach(c=>drawCloud(c.x,c.y,c.w));drawBgElements();drawGround();drawFox(120,GROUND,0,false,false);})();
if(playerName)document.getElementById('nameInput').value=playerName;
if(highScore>0)document.getElementById('highscoreDisp').textContent=`🏆 Your Best: ${highScore}`;
renderLeaderboard(playerName,null);
</script>
